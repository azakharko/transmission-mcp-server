# MCP stdio + Transmission on the same host (Linux): host networking so
# TRANSMISSION_RPC_URL can stay http://127.0.0.1/... (required by this server).
# Copy .env.example to .env and edit. See docs/docker.md

services:
  transmission-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: transmission-mcp-server:local
    container_name: transmission-mcp-server
    network_mode: host
    stdin_open: true
    tty: false
    env_file:
      - .env
